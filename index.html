<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickNotes | Smart Notes App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin: 10px 0;
        }

        .stat-card p {
            margin: 0;
            opacity: 0.9;
        }

        /* Search Box */
        .search-box {
            margin-bottom: 30px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 10px rgba(42,82,152,0.3);
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* Notes Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            max-height: 450px;
            overflow-y: auto;
            padding: 10px;
        }

        .note-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
            border-left: 4px solid #2a5298;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 15px;
            word-wrap: break-word;
            color: #333;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #999;
            margin-top: 10px;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        /* Add Note Section */
        .add-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        .btn-add {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,60,114,0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        /* Scrollbar */
        .notes-grid::-webkit-scrollbar {
            width: 8px;
        }

        .notes-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .notes-grid::-webkit-scrollbar-thumb {
            background: #2a5298;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-pen-fancy"></i> QuickNotes</h1>
            <p>Your smart note-taking companion</p>
        </div>

        <!-- Statistics Dashboard -->
        <div class="stats-row">
            <div class="stat-card">
                <i class="fas fa-sticky-note"></i>
                <h3 id="totalNotes">0</h3>
                <p>Total Notes</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <h3 id="totalWords">0</h3>
                <p>Words Written</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-fire"></i>
                <h3 id="streak">0</h3>
                <p>Day Streak</p>
            </div>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search your notes..." onkeyup="filterNotes()">
            <i class="fas fa-search"></i>
        </div>

        <!-- Notes Container -->
        <div id="notesContainer">
            <div class="empty-state">
                <i class="fas fa-lightbulb"></i>
                <h3>No notes yet</h3>
                <p>Start writing your first note below!</p>
            </div>
        </div>

        <!-- Add Note Section -->
        <div class="add-section">
            <textarea id="noteInput" rows="3" placeholder="What's on your mind?"></textarea>
            <button class="btn-add" onclick="addNote()">
                <i class="fas fa-plus"></i> Add Note
            </button>
        </div>
    </div>

    <script>
        // ✅ CHANGED: Now using your LIVE backend on Render
        const API = 'https://quicknotes-api-pn11.onrender.com/notes';
        let allNotes = [];

        // Load notes on page load
        async function loadNotes() {
            try {
                const response = await fetch(API);
                allNotes = await response.json();
                displayNotes();
                updateStats();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display notes
        function displayNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allNotes.filter(note => 
                note.text.toLowerCase().includes(searchTerm)
            );
            
            const container = document.getElementById('notesContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No notes found</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="notes-grid">
                    ${filtered.map(note => `
                        <div class="note-card">
                            <div class="note-text">${escapeHtml(note.text)}</div>
                            <div class="note-meta">
                                <span><i class="fas fa-clock"></i> ${new Date(note.createdAt).toLocaleDateString()}</span>
                                <button class="delete-btn" onclick="deleteNote(${note.id})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Add new note
        async function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if (!text) {
                alert('✏️ Please write something first!');
                return;
            }
            
            try {
                const response = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, createdAt: new Date().toISOString() })
                });
                
                if (response.ok) {
                    input.value = '';
                    await loadNotes();
                    showToast('Note added successfully! 🎉');
                }
            } catch (error) {
                alert('Could not add note. Is the backend running?');
            }
        }

        // Delete note
        async function deleteNote(id) {
            if (confirm('Delete this note?')) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                await loadNotes();
                showToast('Note deleted! 🗑️');
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalNotes').innerText = allNotes.length;
            
            const totalWords = allNotes.reduce((sum, note) => 
                sum + note.text.split(/\s+/).filter(w => w.length > 0).length, 0
            );
            document.getElementById('totalWords').innerText = totalWords;
            
            // Simple streak calculation
            let streak = Math.min(allNotes.length, 7);
            document.getElementById('streak').innerText = streak;
        }

        // Search filter
        function filterNotes() {
            displayNotes();
        }

        // Show temporary message
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: linear-gradient(135deg, #1e3c72, #2a5298);
                color: white;
                padding: 12px 24px;
                border-radius: 50px;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            `;
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial load
        loadNotes();
    </script>
</body>
</html>
